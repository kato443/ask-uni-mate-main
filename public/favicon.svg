<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#1a237e"/>
  <!-- Graduation cap (mortarboard) -->
  <polygon points="32,14 54,26 32,38 10,26" fill="#FFD700"/>
  <rect x="43" y="26" width="3" height="14" rx="1.5" fill="#FFD700"/>
  <circle cx="44.5" cy="41" r="3" fill="#FFD700"/>
  <!-- Tassel string -->
  <line x1="32" y1="38" x2="32" y2="48" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chat bubble sparkle -->
  <circle cx="46" cy="18" r="5" fill="#ffffff" opacity="0.9"/>
  <text x="46" y="22" text-anchor="middle" font-size="7" fill="#1a237e" font-family="sans-serif" font-weight="bold">✦</text>
</svg>
